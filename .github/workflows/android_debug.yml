name: Android Debug APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter pub get
        run: flutter pub get

      - name: Verify pinned Tracelet
        run: flutter pub deps --style=compact | grep -F "tracelet 1.8.13"

      - name: Test geofence parser
        run: flutter test test/live_place_alert_service_test.dart

      - name: Build debug APK
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: flutter build apk --debug --dart-define=GOOGLE_PLACES_API_KEY=$GOOGLE_PLACES_API_KEY

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: scratchless-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
